services:
  backend:
    build:
      context: ./backend
      target: dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./backend:/app                        # live source code
      - backend_node_modules:/app/node_modules  # keep container's node_modules
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app                         # live source code
      - frontend_node_modules:/app/node_modules # keep container's node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_node_modules:
  frontend_node_modules:
