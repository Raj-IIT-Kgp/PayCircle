services:
  backend:
    image: ghcr.io/raj-iit-kgp/paycircle/backend:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    image: ghcr.io/raj-iit-kgp/paycircle/frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro      # SSL certs (optional)
      - ./nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro  # override if SSL enabled
    depends_on:
      backend:
        condition: service_healthy
